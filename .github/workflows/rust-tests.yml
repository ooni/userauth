name: Rust tests

on:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache to speed up cold starts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets --locked --verbose

  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and install ooniauth-py with maturin
        working-directory: ooniauth-py
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -U maturin
          maturin develop --locked

      - name: Verify Python import
        working-directory: ooniauth-py
        run: |
          source .venv/bin/activate
          python -c "import ooniauth_py"
