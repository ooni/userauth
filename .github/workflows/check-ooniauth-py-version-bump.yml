name: Check ooniauth-py version bump

on:
  pull_request:
    branches:
      - main
    paths:
      - "ooniauth-py/**"
      - "ooniauth-core/**"

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version bumped vs main
        shell: bash
        run: |
          set -euo pipefail

          FILE="ooniauth-py/Cargo.toml"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE in PR branch"
            exit 1
          fi

          git fetch origin main

          MAIN_VERSION="$(git show origin/main:$FILE | sed -n 's/^version = "\(.*\)"/\1/p' | head -n1 || true)"
          PR_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' "$FILE" | head -n1 || true)"

          if [ -z "$MAIN_VERSION" ] || [ -z "$PR_VERSION" ]; then
            echo "Could not parse version from $FILE"
            echo "main='$MAIN_VERSION' pr='$PR_VERSION'"
            exit 1
          fi

          echo "main version: $MAIN_VERSION"
          echo "PR version:     $PR_VERSION"

          # Check that the new version is higher than the version in Main
          HIGHEST="$(printf '%s\n%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | tail -n1)"
          if [ "$PR_VERSION" = "$MAIN_VERSION" ] || [ "$HIGHEST" != "$PR_VERSION" ]; then
            echo "::error::ooniauth-py version in $FILE must be strictly higher than main (main=$MAIN_VERSION, PR=$PR_VERSION)"
            exit 1
          fi

          echo "[OK] Version bump detected (main=$MAIN_VERSION -> PR=$PR_VERSION)"
