name: Build Wheels and Release

on:
  push:
    # TODO: uncomment this before merging
    # tags:
    #   - "userauth-*"
    branches:
      - "36-build-matrix"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: build inside PyPA manylinux images via maturin-action (portable glibc wheels).
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # PyO3 (abi3-py310) links against libpython3.10 for host-side steps (stub gen + macOS wheel).
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Python stubs
        working-directory: ooniauth-py
        run: cargo run --locked --bin gen_stubs

      # manylinux is applied on Linux only, ignored on macOS. See:
      # https://www.maturin.rs/distribution.html
      # https://github.com/PyO3/maturin-action
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ooniauth-py
          manylinux: "2_28"
          args: --release --locked --out wheels --compatibility pypi
          docker-options: -e PYO3_NO_PYTHON=1

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.label }}
          path: ooniauth-py/wheels/*.whl
          if-no-files-found: error

  release-and-publish:
    name: Create release and publish wheels
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Check staged wheels
        run: |
          echo "Wheel files in dist:"
          ls -la dist

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl

      # TODO: Uncomment before merging
