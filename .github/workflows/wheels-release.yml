name: Build Wheels and Release

on:
  push:
    branches:
      - "main"
    paths:
      - "ooniauth-core/**"
      - "ooniauth-py/**"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Prefer building portable abi3 wheels without requiring a build-time interpreter.
  PYO3_NO_PYTHON: "1"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: python -m pip install -U pip maturin

      - name: Build wheels
        working-directory: ooniauth-py
        run: make wheels

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ooniauth-py/wheels/*.whl
          if-no-files-found: error

  release-and-publish:
    name: Create release and publish wheels
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Check staged wheels
        run: |
          echo "Wheel files in dist:"
          ls -la dist

      - name: Compute release tag name
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="ooniauth-py-${SHORT_SHA}-${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl

      # This might fail with status code 400 if the version already exists,
      # remember to bump it
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }} # use this for testing the workflow
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          # repository-url: https://test.pypi.org/legacy/ # uncomment this to use the test api token
