name: Build Wheels and Release

on:
  push:
    tags:
      - "userauth-*"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Prefer building portable abi3 wheels without requiring a build-time interpreter.
  PYO3_NO_PYTHON: "1"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: python -m pip install -U pip maturin

      - name: Build wheels
        working-directory: ooniauth-py
        run: make wheels

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ooniauth-py/wheels/*.whl
          if-no-files-found: error

  release-and-publish:
    name: Create release and publish wheels
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      # pulls the current version from pypi and compares with the current version on ooniauth-py
      - name: Verify version is greater than PyPI
        shell: bash
        run: |
          set -euo pipefail

          LOCAL_VERSION="$(awk -F '"' '/^version = "/ { print $2; exit }' ooniauth-py/Cargo.toml)"
          PYPI_VERSION="$(python3 - <<'PY'
          import json
          import urllib.request

          url = "https://pypi.org/pypi/ooniauth-py/json"
          with urllib.request.urlopen(url, timeout=20) as response:
              data = json.load(response)
          print(data["info"]["version"])
          PY
          )"

          if [[ -z "$LOCAL_VERSION" || -z "$PYPI_VERSION" ]]; then
            echo "Failed to parse local or PyPI version." >&2
            exit 1
          fi

          echo "Local version: $LOCAL_VERSION"
          echo "PyPI version:  $PYPI_VERSION"

          HIGHEST="$(printf '%s\n%s\n' "$PYPI_VERSION" "$LOCAL_VERSION" | sort -V | tail -n 1)"
          if [[ "$LOCAL_VERSION" == "$PYPI_VERSION" || "$HIGHEST" != "$LOCAL_VERSION" ]]; then
            echo "Local version must be greater than PyPI version." >&2
            exit 1
          fi

      - name: Check staged wheels
        run: |
          echo "Wheel files in dist:"
          ls -la dist

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl

      # This might fail with status code 400 if the version already exists,
      # remember to bump it
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }} # use this for testing the workflow
          # password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/ # uncomment this to use the test api token
